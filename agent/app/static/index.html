<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Library Knowledge Base — Agentic AI (Python)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&family=Source+Code+Pro&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body>
  <div class="topbar">
    <span class="brand">
      <svg class="logo" viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#ffd43b" d="M54 5c-13 0-12 6-12 6v8h24v3H30s-16-2-16 24 14 24 14 24h8v-9s0-14 14-14h24s13 0 13-13V19S88 5 54 5zM40 12a4 4 0 110 8 4 4 0 010-8z"/>
        <path fill="#3776ab" d="M56 105c13 0 12-6 12-6v-8H44v-3h36s16 2 16-24-14-24-14-24h-8v9s0 14-14 14H36s-13 0-13 13v22s-2 7 36 7zM70 98a4 4 0 110-8 4 4 0 010 8z"/>
      </svg>
      Agentic AI <span class="suffix">(Python)</span>
    </span>
    <nav>
      <a href="/" class="active">Chat</a>
      <a href="http://localhost:8081/">Ingest</a>
    </nav>
  </div>

  <div class="hero">
    <h1>Your <span class="accent">Library</span> Knowledge Base</h1>
    <p>+ web search and conversations</p>
  </div>

  <div class="layout">
    <!-- Chat column -->
    <div>
      <div class="card">
        <div id="thread" class="thread"></div>
        <div id="loading" class="loading" style="display:none;">
          <svg class="spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          <span id="loadingText">Thinking…</span>
        </div>
        <div id="errorBanner" class="banner-error" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>
          <span id="errorText"></span>
        </div>

        <div class="composer">
          <textarea id="query" placeholder="Ask anything…"></textarea>
          <button class="btn-primary" id="sendBtn" title="Send">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
          </button>
        </div>

        <div class="controls">
          <button class="toggle" id="webToggle" title="Search the web (Tavily)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
            Web
          </button>
          <button class="toggle" id="libToggle" title="Search My Library (PDFs + database)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 0 3-3h7z"/></svg>
            My Library
          </button>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="card sidebar">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Past conversations</h3>
        <button class="btn-ghost" id="newChatBtn" title="New chat">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          New
        </button>
      </div>
      <div id="convList" class="conv-list"></div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
